<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Emad Rahimi</title>
  <desc id="desc">ER monogram prepared for a circular GitHub profile image.</desc>

  <defs>
    <radialGradient id="surface" cx="0" cy="0" r="1" gradientTransform="translate(374 292) rotate(48) scale(910)">
      <stop stop-color="#102a39"/>
      <stop offset="0.48" stop-color="#071523"/>
      <stop offset="1" stop-color="#040812"/>
    </radialGradient>
    <radialGradient id="aura" cx="0" cy="0" r="1" gradientTransform="translate(664 376) rotate(132) scale(510)">
      <stop stop-color="#2dd4bf" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="32" y1="40" x2="132" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#e8eef3"/>
      <stop offset="0.82" stop-color="#b9c5d1"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="accent" x1="31" y1="72" x2="76" y2="79" gradientUnits="userSpaceOnUse">
      <stop stop-color="#42e9dc"/>
      <stop offset="0.68" stop-color="#9cfff5"/>
      <stop offset="1" stop-color="#f8ffff"/>
    </linearGradient>
    <linearGradient id="edge" x1="154" y1="82" x2="862" y2="928" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b8fff8" stop-opacity="0.75"/>
      <stop offset="0.45" stop-color="#31cfc5" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#64748b" stop-opacity="0.24"/>
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#cbd5e1" stroke-opacity="0.035"/>
    </pattern>
    <filter id="shadow" x="-35%" y="-40%" width="175%" height="190%">
      <feDropShadow dx="0" dy="14" stdDeviation="10" flood-color="#00040c" flood-opacity="0.72"/>
    </filter>
    <filter id="glow" x="-55%" y="-100%" width="210%" height="300%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feFlood flood-color="#42e9dc" flood-opacity="0.48"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="safe-circle">
      <circle cx="512" cy="512" r="510"/>
    </clipPath>
  </defs>

  <g clip-path="url(#safe-circle)">
    <rect width="1024" height="1024" fill="url(#surface)"/>
    <rect width="1024" height="1024" fill="url(#grid)"/>
    <rect width="1024" height="1024" fill="url(#aura)"/>
    <ellipse cx="710" cy="304" rx="450" ry="250" fill="none" stroke="#5eead4" stroke-opacity="0.08" transform="rotate(-18 710 304)"/>
    <path d="M730 -130L1110 1030" stroke="#a5f3fc" stroke-opacity="0.035" stroke-width="120"/>
  </g>

  <circle cx="512" cy="512" r="486" fill="none" stroke="url(#edge)" stroke-width="5"/>

  <g transform="translate(80 80) scale(5.4)" filter="url(#shadow)">
    <path d="M31 48C31 43.6 34.6 40 39 40H78V43C78 49.1 73.1 54 67 54H31V48Z" fill="url(#metal)"/>
    <path d="M31 73C31 68.6 34.6 65 39 65H75V68C75 74.1 70.1 79 64 79H31V73Z" fill="url(#accent)" filter="url(#glow)"/>
    <path d="M31 98C31 93.6 34.6 90 39 90H78V93C78 99.1 73.1 104 67 104H31V98Z" fill="url(#metal)"/>
    <path d="M85 40H110C125.5 40 136 50.2 136 65C136 76.2 129.4 84.5 119.7 88.2L132 108H114L101.7 91H85V77H109.5C116.4 77 120.5 72.6 120.5 65.6C120.5 58.6 116.1 54 109.2 54H85V40Z" fill="url(#metal)"/>
  </g>
</svg>
