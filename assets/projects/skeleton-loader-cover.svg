<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Skeleton Loader</title>
  <desc id="desc">A short Rails helper generating a profile skeleton.</desc>
  <defs>
    <linearGradient id="bg" x1="30" y1="20" x2="930" y2="585" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1b1118"/><stop offset="0.48" stop-color="#0c1018"/><stop offset="1" stop-color="#080b12"/>
    </linearGradient>
    <radialGradient id="aura" cx="0" cy="0" r="1" gradientTransform="translate(170 120) rotate(42) scale(440 330)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e11d48" stop-opacity="0.24"/><stop offset="1" stop-color="#e11d48" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#222c3a"/><stop offset="0.5" stop-color="#536176"/><stop offset="1" stop-color="#222c3a"/>
    </linearGradient>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0V52" fill="none" stroke="#f8fafc" stroke-opacity="0.032"/>
    </pattern>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="180%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="frame"><rect width="960" height="600" rx="30"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="960" height="600" fill="url(#bg)"/><rect width="960" height="600" fill="url(#grid)"/><rect width="960" height="600" fill="url(#aura)"/>
    <ellipse cx="830" cy="90" rx="300" ry="170" fill="none" stroke="#fb7185" stroke-opacity="0.07" transform="rotate(-12 830 90)"/>
    <text x="58" y="69" fill="#fda4af" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" letter-spacing="2.7">SKELETON LOADER / RAILS GEM</text>

    <g filter="url(#shadow)">
      <rect x="58" y="137" width="370" height="330" rx="26" fill="#090d14" stroke="#fb7185" stroke-opacity="0.26" stroke-width="2"/>
      <rect x="58" y="137" width="370" height="54" rx="26" fill="#141019"/>
      <path d="M58 191H428" stroke="#fb7185" stroke-opacity="0.14"/>
      <circle cx="84" cy="164" r="5" fill="#fb7185" fill-opacity="0.72"/><circle cx="102" cy="164" r="5" fill="#64748b" fill-opacity="0.48"/><circle cx="120" cy="164" r="5" fill="#64748b" fill-opacity="0.3"/>
      <text x="326" y="169" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1.2">SHOW.HTML.ERB</text>

      <text x="84" y="250" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">&lt;%=</text>
      <text x="129" y="250" fill="#fda4af" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">skeleton_loader</text>
      <text x="297" y="250" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">(</text>
      <text x="110" y="300" fill="#7dd3fc" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">type:</text>
      <text x="179" y="300" fill="#fda4af" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">:profile</text>
      <text x="110" y="350" fill="#7dd3fc" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">count:</text>
      <text x="190" y="350" fill="#fde68a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">1</text>
      <text x="84" y="400" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">) %&gt;</text>
    </g>

    <path d="M456 302H500" stroke="#fb7185" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 10"/>
    <path d="M489 291L503 302L489 313" fill="none" stroke="#fb7185" stroke-opacity="0.74" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <g filter="url(#shadow)">
      <rect x="530" y="120" width="370" height="390" rx="32" fill="#0d1521" stroke="#94a3b8" stroke-opacity="0.19" stroke-width="2"/>
      <path d="M568 174H862" stroke="#fff" stroke-opacity="0.055"/>
      <circle cx="650" cy="286" r="66" fill="url(#shimmer)"/>
      <rect x="746" y="234" width="112" height="22" rx="11" fill="url(#shimmer)"/>
      <rect x="746" y="282" width="86" height="15" rx="7.5" fill="#334052"/>
      <rect x="746" y="325" width="120" height="13" rx="6.5" fill="#273342"/>
      <rect x="574" y="406" width="282" height="14" rx="7" fill="#222d3b"/>
      <rect x="574" y="443" width="202" height="12" rx="6" fill="#1c2633"/>
    </g>
  </g>
  <rect x="1" y="1" width="958" height="598" rx="29" fill="none" stroke="#fff" stroke-opacity="0.1"/>
</svg>
