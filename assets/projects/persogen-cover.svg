<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Persogen</title>
  <desc id="desc">A small GET request object generating a fictional John Doe profile.</desc>
  <defs>
    <linearGradient id="bg" x1="24" y1="24" x2="930" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14152d"/><stop offset="0.5" stop-color="#090f1f"/><stop offset="1" stop-color="#071117"/>
    </linearGradient>
    <radialGradient id="violetAura" cx="0" cy="0" r="1" gradientTransform="translate(180 110) rotate(42) scale(440 330)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c3aed" stop-opacity="0.28"/><stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="avatar" x1="610" y1="180" x2="790" y2="410" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a78bfa"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0V52" fill="none" stroke="#f8fafc" stroke-opacity="0.032"/>
    </pattern>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="180%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="frame"><rect width="960" height="600" rx="30"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="960" height="600" fill="url(#bg)"/><rect width="960" height="600" fill="url(#grid)"/><rect width="960" height="600" fill="url(#violetAura)"/>
    <ellipse cx="820" cy="100" rx="310" ry="174" fill="none" stroke="#a78bfa" stroke-opacity="0.075" transform="rotate(-12 820 100)"/>
    <text x="58" y="69" fill="#c4b5fd" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" letter-spacing="2.7">PERSOGEN / REST API</text>

    <g filter="url(#shadow)">
      <rect x="58" y="126" width="390" height="368" rx="28" fill="#090f1b" stroke="#a78bfa" stroke-opacity="0.25" stroke-width="2"/>
      <rect x="58" y="126" width="390" height="64" rx="28" fill="#11142a"/>
      <path d="M58 190H448" stroke="#a78bfa" stroke-opacity="0.14"/>
      <rect x="82" y="143" width="62" height="32" rx="10" fill="#22d3ee" fill-opacity="0.11"/>
      <text x="113" y="164" fill="#67e8f9" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="750">GET</text>
      <text x="162" y="165" fill="#d8dee9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">/profiles</text>
      <circle cx="416" cy="158" r="5" fill="#6ee7b7"/>

      <text x="84" y="240" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">{</text>
      <text x="112" y="282" fill="#7dd3fc" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">"locale"</text>
      <text x="197" y="282" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">:</text>
      <text x="215" y="282" fill="#c4b5fd" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">"en-US"</text>
      <text x="112" y="330" fill="#7dd3fc" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">"count"</text>
      <text x="178" y="330" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">:</text>
      <text x="196" y="330" fill="#fde68a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">1</text>
      <text x="112" y="378" fill="#7dd3fc" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">"gender"</text>
      <text x="197" y="378" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">:</text>
      <text x="215" y="378" fill="#c4b5fd" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">"male"</text>
      <text x="84" y="426" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">}</text>
    </g>

    <path d="M474 309H516" stroke="#a78bfa" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 10"/>
    <path d="M505 298L519 309L505 320" fill="none" stroke="#a78bfa" stroke-opacity="0.74" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <g opacity="0.28" transform="translate(28 -20) rotate(4 700 315)"><rect x="546" y="112" width="350" height="396" rx="34" fill="#151a2c" stroke="#a78bfa" stroke-opacity="0.28" stroke-width="2"/></g>
    <g filter="url(#shadow)">
      <rect x="546" y="112" width="350" height="396" rx="34" fill="#0c1422" stroke="#94a3b8" stroke-opacity="0.2" stroke-width="2"/>
      <circle cx="721" cy="257" r="78" fill="url(#avatar)"/>
      <circle cx="721" cy="235" r="25" fill="#0b1220" fill-opacity="0.84"/>
      <path d="M673 305C682 267 760 267 769 305" fill="#0b1220" fill-opacity="0.84"/>
      <text x="721" y="382" fill="#f8fafc" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="29" font-weight="720">John Doe</text>
      <text x="721" y="419" fill="#94a3b8" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">john.doe@example.test</text>
      <path d="M596 452H846" stroke="#fff" stroke-opacity="0.07"/>
      <text x="721" y="484" fill="#67e8f9" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="650" letter-spacing="1.2">SYNTHETIC / EN-US</text>
    </g>
  </g>
  <rect x="1" y="1" width="958" height="598" rx="29" fill="none" stroke="#fff" stroke-opacity="0.1"/>
</svg>
