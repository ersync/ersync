<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
  <title id="title">Emad Rahimi</title>
  <desc id="desc">Full-stack developer working from data model to final interaction.</desc>
  <defs>
