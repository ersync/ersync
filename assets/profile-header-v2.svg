      <stop stop-color="#071621"/><stop offset="0.52" stop-color="#030914"/><stop offset="1" stop-color="#090818"/>
    </linearGradient>
    <radialGradient id="teal" cx="0" cy="0" r="1" gradientTransform="translate(905 70) rotate(145) scale(470 270)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2dd4bf" stop-opacity="0.22"/><stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
